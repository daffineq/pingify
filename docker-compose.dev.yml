services:
  postgres:
    image: postgres:latest
    container_name: postgres_pingify
    restart: always
    environment:
      POSTGRES_USER: drizzle
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pingify
    ports:
      - '5431:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: redis_pingify
    restart: always
    ports:
      - '6377:6379'

volumes:
  postgres_data:
